# BeQuite CI — runs on every push + PR (v0.15.0+).
#
# Three jobs:
#   1. lint — ruff + mypy across cli/.
#   2. test — full integration suite across Python 3.11 / 3.12 / 3.13 / 3.14.
#   3. audit — bequite audit + freshness against the BeQuite repo itself
#      (eat-our-own-food).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev extras
        run: cd cli/ && pip install -e ".[dev]"
      - name: ruff
        run: cd cli/ && ruff check .
      - name: mypy (advisory)
        run: cd cli/ && mypy bequite || true   # advisory until v0.10.x types stabilize

  test:
    name: Integration suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: cd cli/ && pip install -e ".[dev]"
      - name: Receipts (10)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/receipts/test_receipts_smoke.py
      - name: Signing (9)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/receipts/test_signing_smoke.py
      - name: Router (15)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/router/test_router_smoke.py
      - name: Pricing (14)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/pricing/test_pricing_smoke.py
      - name: E2E walk (8)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/e2e/test_seven_phase_walk.py
      - name: E2E doctrines (8)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/e2e/test_doctrine_loading.py
      - name: Auto-mode (11)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/auto/test_auto_smoke.py
      - name: Auto-state (13)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/auto/test_auto_state_smoke.py
      - name: Multi-model (12)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/multi_model/test_multi_model_smoke.py
      - name: Auth (8)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/auth/test_auth_smoke.py
      - name: Skill install (9)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/skill_install/test_skill_install_smoke.py
      - name: Exporters (8)
        run: cd cli/ && PYTHONIOENCODING=utf-8 python ../tests/integration/exporters/test_exporters_smoke.py

  audit:
    name: BeQuite eats its own food
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: cd cli/ && pip install -e ".[dev]"
      - name: bequite audit (advisory)
        run: cd cli/ && python -m bequite.audit --repo .. || true
      - name: bequite freshness self-check
        run: cd cli/ && python -m bequite.freshness --help

  license-audit:
    name: License audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install osv-scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --version
      - name: Run osv-scanner (advisory)
        run: ./osv-scanner --recursive . || true

  pr-summary:
    needs: [lint, test, audit, license-audit]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Comment on PR with summary
        uses: actions/github-script@v7
        with:
          script: |
            const allGreen =
              '${{ needs.lint.result }}' === 'success' &&
              '${{ needs.test.result }}' === 'success' &&
              '${{ needs.audit.result }}' === 'success' &&
              '${{ needs.license-audit.result }}' === 'success';
            const status = allGreen ? '✅ all green' : '❌ failures';
            const body = `### BeQuite CI — ${status}

            - lint:           ${{ needs.lint.result }}
            - test (4 Pythons): ${{ needs.test.result }}
            - audit:          ${{ needs.audit.result }}
            - license-audit:  ${{ needs.license-audit.result }}

            See workflow run for details.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
