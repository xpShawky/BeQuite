name: bequite audit

on:
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.py"
      - "**/*.rs"
      - "**/*.go"
      - "**/*.css"
      - "**/*.scss"
      - "**/*.vue"
      - "**/*.svelte"
      - "**/*.html"
      - ".n8n/workflows/**"
      - "scenarios/**"
      - "zaps/**"
      - "workflows/**"
      - "inngest/**"
      - ".bequite/memory/constitution.md"
      - "skill/doctrines/**"
      - "state/project.yaml"
      - ".bequite/bequite.config.toml"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.py"
      - ".bequite/memory/constitution.md"
      - "skill/doctrines/**"
  workflow_dispatch: {}
  schedule:
    # Quarterly drift sweep — every Monday at 09:00 UTC.
    - cron: "0 9 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bequite audit
        id: audit
        run: |
          set +e
          python -m cli.bequite.audit --ci --json > audit-output.json
          AUDIT_EXIT=$?
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"
          # Pretty-print for the summary
          python -m cli.bequite.audit --ci > audit-output.md
          echo "FINDINGS=$(wc -l < audit-output.md)" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post audit summary
        if: always()
        run: |
          if [ -s audit-output.md ]; then
            echo "## bequite audit findings" >> "$GITHUB_STEP_SUMMARY"
            cat audit-output.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## bequite audit — PASS (zero findings)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on PR (only when blockers found)
        if: github.event_name == 'pull_request' && steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('audit-output.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### bequite audit — drift detected\n\n${body}\n\n_Iron Law III: this PR cannot merge until all \`block\`-severity findings are resolved or accepted via ADR._`
            });

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bequite-audit-${{ github.run_number }}
          path: |
            audit-output.json
            audit-output.md
          retention-days: 30

      - name: Fail on blocker findings
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1
