# BeQuite Studio — three-service stack (api / dashboard / marketing).
#
# Usage:
#   docker compose up --build         # first time (builds images)
#   docker compose up                 # subsequent runs (uses built images)
#   docker compose up -d              # detached mode
#   docker compose down               # stop + remove containers
#   docker compose logs -f api        # follow API logs
#
# Ports (host:container):
#   3000 — marketing (cinematic landing + /docs vibecoder tutorials)
#   3001 — dashboard (operations console; LiveIndicator + xterm.js terminal)
#   3002 — api       (Hono on Bun; auth + writes + SSE streams + terminal)
#
# Default auth mode: local-dev (no token required). Override via:
#   docker compose run -e BEQUITE_AUTH_MODE=token api ...

services:
  api:
    build:
      context: ./studio/api
      dockerfile: Dockerfile
    image: bequite-api:local
    container_name: bequite-api
    ports:
      - "3002:3002"
    volumes:
      # Mount the BeQuite repo itself as the workspace. The API reads
      # .bequite/{receipts,memory,cache}/, state/ from here. Writes
      # (POST /api/v1/receipts, POST /api/v1/snapshots) land back in the
      # mounted directory so they're visible outside the container.
      - .:/workspace
    environment:
      BEQUITE_WORKSPACE_ROOT: /workspace
      BEQUITE_AUTH_MODE: local-dev
      PORT: "3002"
    # Healthcheck uses Bun's native fetch (no wget/curl in oven/bun base image).
    # Matches the HEALTHCHECK directive in studio/api/Dockerfile.
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3002/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  dashboard:
    build:
      context: ./studio/dashboard
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time. The browser uses this URL
        # for EventSource (live updates). MUST be the HOST-published port,
        # NOT the docker service name, because the browser runs outside the
        # docker network.
        NEXT_PUBLIC_BEQUITE_API_BASE: http://localhost:3002
    image: bequite-dashboard:local
    container_name: bequite-dashboard
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Server-side fetches (Next.js server components / loadProject()).
      # Uses the docker service name `api` so requests stay inside the
      # docker network.
      BEQUITE_API_BASE: http://api:3002
      BEQUITE_DASHBOARD_MODE: http
      PORT: "3001"
    restart: unless-stopped

  marketing:
    build:
      context: ./studio/marketing
      dockerfile: Dockerfile
    image: bequite-marketing:local
    container_name: bequite-marketing
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    restart: unless-stopped

# Optional named volume for build cache reuse across rebuilds.
# Uncomment if you find rebuild times too long:
# volumes:
#   build-cache:
